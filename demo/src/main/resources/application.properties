spring.application.name=trananhtien
# URL ket noi: Thay 'Ten_Database_Cua_Ban' bang ten DB ban da tao trong SQL Management Studio
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=webbanhang;encrypt=true;trustServerCertificate=true

# Tai khoan SQL Server
spring.datasource.username=anhtien
spring.datasource.password=123456789
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Cau hinh Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Cau hinh upload file
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Thu muc luu anh (trong static)
app.upload.dir=uploads