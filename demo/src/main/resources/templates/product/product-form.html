<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">

    <!-- Page Header -->
    <div class="page-header">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a href="/">Trang Chủ</a></li>
                <li class="breadcrumb-item"><a href="/products">Sản Phẩm</a></li>
                <li class="breadcrumb-item active" th:text="${product.id == null ? 'Thêm Mới' : 'Chỉnh Sửa'}">Form</li>
            </ol>
        </nav>
    </div>

    <div class="row mt-4">
        <!-- Form Section -->
        <div class="col-lg-8">
            <div class="page-header">
                <h5 class="mb-4">
                    <i class="bi bi-box-seam"></i>
                    <span th:text="${product.id == null ? 'Thêm Sản Phẩm Mới' : 'Chỉnh Sửa Sản Phẩm'}">Form Sản Phẩm</span>
                </h5>
                
                <!-- Error Message -->
                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
                
                <form th:action="@{/products/save}" 
                      th:object="${product}" 
                      method="post" 
                      enctype="multipart/form-data">

                    <!-- Hidden ID -->
                    <input type="hidden" th:field="*{id}">

                    <!-- Tên Sản Phẩm -->
                    <div class="mb-3">
                        <label for="name" class="form-label fw-bold">
                            Tên Sản Phẩm <span class="text-danger">*</span>
                        </label>
                        <input type="text" 
                               class="form-control" 
                               id="name"
                               th:field="*{name}"
                               placeholder="Nhập tên sản phẩm..."
                               required>
                    </div>

                    <!-- Giá Sản Phẩm -->
                    <div class="mb-3">
                        <label for="price" class="form-label fw-bold">
                            Giá (VNĐ) <span class="text-danger">*</span>
                        </label>
                        <input type="number" 
                               class="form-control" 
                               id="price"
                               th:field="*{price}"
                               min="0"
                               placeholder="0"
                               required>
                    </div>

                    <!-- Danh Mục -->
                    <div class="mb-3">
                        <label for="category" class="form-label fw-bold">
                            Danh Mục <span class="text-danger">*</span>
                        </label>
                        <select class="form-select" 
                                id="category"
                                th:field="*{category.id}"
                                required>
                            <option value="">-- Chọn Danh Mục --</option>
                            <option th:each="cat : ${categories}" 
                                    th:value="${cat.id}" 
                                    th:text="${cat.name}">
                                Danh Mục
                            </option>
                        </select>
                    </div>

                    <!-- Mô Tả -->
                    <div class="mb-3">
                        <label for="description" class="form-label fw-bold">
                            Mô Tả
                        </label>
                        <textarea class="form-control" 
                                  id="description"
                                  th:field="*{description}"
                                  rows="3" 
                                  placeholder="Nhập mô tả sản phẩm..."></textarea>
                    </div>

                    <!-- Upload Ảnh -->
                    <div class="mb-4">
                        <label for="imageFile" class="form-label fw-bold">
                            Hình Ảnh Sản Phẩm
                        </label>
                        <input type="file" 
                               class="form-control" 
                               id="imageFile" 
                               name="imageFile"
                               accept="image/*"
                               onchange="previewImage(this)">
                        <small class="text-muted">Chấp nhận: JPG, PNG, GIF (tối đa 10MB)</small>
                        
                        <!-- Preview ảnh mới chọn -->
                        <div id="imagePreview" class="mt-3" style="display: none;">
                            <p class="text-muted mb-1">Ảnh mới:</p>
                            <img id="preview" src="" class="product-image" style="width: 150px; height: 150px;" alt="Preview">
                        </div>
                        
                        <!-- Hiển thị ảnh hiện tại khi edit -->
                        <div th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}" class="mt-3">
                            <p class="text-muted mb-1">Ảnh hiện tại:</p>
                            <img th:src="${product.imageUrl}" class="product-image" style="width: 150px; height: 150px;" alt="Current Image">
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-add">
                            <i class="bi bi-check-circle"></i>
                            <span th:text="${product.id == null ? 'Thêm Sản Phẩm' : 'Cập Nhật'}">Lưu</span>
                        </button>
                        <a href="/products" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Hủy
                        </a>
                    </div>

                </form>
            </div>
        </div>

        <!-- Preview Section -->
        <div class="col-lg-4">
            <div class="page-header position-sticky" style="top: 20px;">
                <h6 class="mb-3"><i class="bi bi-eye"></i> Xem Trước</h6>
                
                <div class="text-center mb-3">
                    <img id="livePreviewImage" 
                        th:src="${product.imageUrl != null and !product.imageUrl.isEmpty() ? product.imageUrl : '/images/product-fallback.svg'}"
                        src="/images/product-fallback.svg"
                         class="product-image" 
                         style="width: 200px; height: 200px;"
                         alt="Preview">
                </div>
                
                <h6 id="previewName" class="fw-bold" th:text="${product.name ?: 'Tên sản phẩm'}">Tên sản phẩm</h6>
                <p class="text-muted small mb-2" id="previewCategory">Danh mục</p>
                <p class="price-text mb-2" id="previewPrice">
                    <span th:text="${product.price != null ? #numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT') + ' VNĐ' : '0 VNĐ'}">0 VNĐ</span>
                </p>
                <p class="text-muted small" id="previewDescription" th:text="${product.description ?: 'Mô tả sản phẩm...'}">Mô tả sản phẩm...</p>
            </div>
        </div>
    </div>

</div>

<script layout:fragment="scripts">
    // Preview image khi chọn file
    function previewImage(input) {
        const preview = document.getElementById('preview');
        const livePreview = document.getElementById('livePreviewImage');
        const previewDiv = document.getElementById('imagePreview');
        
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                livePreview.src = e.target.result;
                previewDiv.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // Live Preview
    document.getElementById('name')?.addEventListener('input', function() {
        document.getElementById('previewName').textContent = this.value || 'Tên sản phẩm';
    });

    document.getElementById('price')?.addEventListener('input', function() {
        const price = parseFloat(this.value) || 0;
        document.getElementById('previewPrice').textContent = price.toLocaleString('vi-VN') + ' VNĐ';
    });

    document.getElementById('category')?.addEventListener('change', function() {
        const selectedText = this.options[this.selectedIndex].text;
        document.getElementById('previewCategory').textContent = 
            selectedText === '-- Chọn Danh Mục --' ? 'Danh mục' : selectedText;
    });

    document.getElementById('description')?.addEventListener('input', function() {
        document.getElementById('previewDescription').textContent = this.value || 'Mô tả sản phẩm...';
    });
</script>
</body>
</html>
