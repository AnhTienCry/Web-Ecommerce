<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">

    <!-- Page Header -->
    <div class="page-header">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a href="/">Trang Chủ</a></li>
                <li class="breadcrumb-item"><a href="/categories">Danh Mục</a></li>
                <li class="breadcrumb-item active">Thêm Mới</li>
            </ol>
        </nav>
    </div>

    <div class="row mt-4">
        <!-- Form Section -->
        <div class="col-lg-6">
            <div class="page-header">
                <h5 class="mb-4"><i class="bi bi-grid-3x3-gap"></i> Thêm Danh Mục Mới</h5>
                
                <form th:action="@{/categories/add}" 
                      th:object="${category}" 
                      method="post">

                    <!-- Tên Danh Mục -->
                    <div class="mb-3">
                        <label for="name" class="form-label fw-bold">
                            Tên Danh Mục <span class="text-danger">*</span>
                        </label>
                        <input type="text" 
                               class="form-control"
                               id="name"
                               th:field="*{name}"
                               placeholder="VD: Điện thoại, Laptop, Phụ kiện..."
                               required>
                        
                        <div class="text-danger small mt-2" 
                             th:if="${#fields.hasErrors('name')}" 
                             th:errors="*{name}">
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-add">
                            <i class="bi bi-check-circle"></i> Thêm Danh Mục
                        </button>
                        <a href="/categories" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Hủy
                        </a>
                    </div>

                </form>
            </div>
        </div>

        <!-- Quick Info -->
        <div class="col-lg-6">
            <div class="page-header">
                <h6 class="mb-3"><i class="bi bi-lightbulb"></i> Gợi ý</h6>
                <ul class="small text-muted mb-0">
                    <li>Tên danh mục nên ngắn gọn, dễ nhớ</li>
                    <li>Phản ánh đúng nhóm sản phẩm</li>
                    <li>Tránh trùng lặp với danh mục đã có</li>
                </ul>
            </div>
        </div>
    </div>

</div>
</body>
</html>
