<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">

    <!-- Page Header -->
    <div class="page-header d-flex justify-content-between align-items-center">
        <h4><i class="bi bi-grid-3x3-gap"></i> Danh sách danh mục</h4>
        <a href="/categories/add" class="btn btn-add">
            <i class="bi bi-plus-circle"></i> Thêm danh mục
        </a>
    </div>

    <!-- Categories Table -->
    <div class="product-table">
        <table class="table mb-0">
            <thead>
            <tr>
                <th style="width: 8%">#</th>
                <th style="width: 40%">Tên danh mục</th>
                <th style="width: 25%">Số sản phẩm</th>
                <th style="width: 27%" class="text-center">Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <!-- Empty State -->
            <tr th:if="${#lists.isEmpty(categories)}">
                <td colspan="4" class="text-center py-5">
                    <i class="bi bi-inbox" style="font-size: 48px; color: #ccc;"></i>
                    <p class="text-muted mt-3 mb-0">Chưa có danh mục nào</p>
                    <a href="/categories/add" class="btn btn-add mt-3">
                        <i class="bi bi-plus-circle"></i> Thêm danh mục đầu tiên
                    </a>
                </td>
            </tr>

            <!-- Category Rows -->
            <tr th:each="category, iterStat : ${categories}">
                <td class="fw-bold" th:text="${iterStat.count}">1</td>
                <td>
                    <strong th:text="${category.name}">Tên danh mục</strong>
                </td>
                <td>
                    <span class="category-badge" 
                          th:text="${category.products != null ? #lists.size(category.products) + ' sản phẩm' : '0 sản phẩm'}">
                        0 sản phẩm
                    </span>
                </td>
                <td class="text-center">
                    <a th:href="@{/products?category={id}(id=${category.id})}" class="btn btn-cart btn-sm me-1">
                        <i class="bi bi-eye"></i> Xem SP
                    </a>
                    <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="btn btn-edit btn-sm me-1">
                        <i class="bi bi-pencil-square"></i> Sửa
                    </a>
                    <a th:href="@{/categories/delete/{id}(id=${category.id})}" class="btn btn-delete btn-sm"
                       onclick="return confirm('Bạn có chắc muốn xóa danh mục này?')">
                        <i class="bi bi-trash"></i> Xóa
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Statistics -->
    <div class="row mt-4">
        <div class="col-md-6">
            <div class="page-header text-center">
                <h5 class="text-primary mb-0" th:text="${#lists.size(categories)}">0</h5>
                <small class="text-muted">Tổng danh mục</small>
            </div>
        </div>
        <div class="col-md-6">
            <div class="page-header text-center">
                <a href="/products" class="btn btn-add w-100">Xem tất cả sản phẩm</a>
            </div>
        </div>
    </div>

</div>
</body>
</html>
