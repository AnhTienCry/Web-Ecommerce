<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mega Menu Demo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container">
        <nav class="nav">
          <a class="nav-item" href="#"><i class="bi bi-phone"></i> Điện thoại</a>
          <a class="nav-item" href="#"><i class="bi bi-laptop"></i> Laptop</a>
          <a class="nav-item has-dropdown" href="#" data-nav="phu-kien">
            <i class="bi bi-headphones"></i> Phụ kiện
            <span class="dropdown-arrow">›</span>
          </a>
          <a class="nav-item" href="#"><i class="bi bi-smartwatch"></i> Smartwatch</a>
          <a class="nav-item" href="#"><i class="bi bi-stopwatch"></i> Đồng hồ</a>
        </nav>
      </div>
    </header>

    <main class="page">
      <div class="container">
        <div class="mega-wrapper" id="megaWrapper">
          <div class="mega-menu" id="megaMenu" aria-hidden="true"></div>
        </div>
      </div>
    </main>

    <script src="menu.js"></script>
  </body>
</html>
